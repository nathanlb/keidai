name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  packages:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup
      - run: pnpm turbo run build test --filter=@keidai/shared
      - run: pnpm turbo run build typecheck --filter=@keidai/ui

  torii:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup
      - run: pnpm turbo run build test --filter=@keidai/torii...

  shaiden:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup
      - run: pnpm turbo run build test --filter=@keidai/shaiden...

  keidai-ui-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup
      - run: pnpm turbo run build --filter=@keidai/keidai-ui...
      - run: pnpm --filter @keidai/keidai-ui exec vitest run --project unit
      - run: pnpm --filter @keidai/keidai-ui run test:server

  keidai-ui-browser:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup
      - uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm --filter @keidai/keidai-ui exec playwright install chromium
      - run: pnpm turbo run build --filter=@keidai/keidai-ui...
      - run: pnpm --filter @keidai/keidai-ui exec vitest run --project browser
      - run: pnpm --filter @keidai/keidai-ui run test:e2e
