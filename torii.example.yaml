# Torii gateway configuration — loaded at boot, no database required.
#
# Shapes match @keidai/shared (ToriiConfig, ServerConfig, CredentialConfig,
# PolicyConfig, OAuthProviderConfig, AgentRegistrationConfig). Env refs use ${env:VAR} and are resolved
# before validation.

oauth_providers:
  github:
    token_url: https://github.com/login/oauth/access_token
    client_id: ${env:GITHUB_CLIENT_ID}
    client_secret: ${env:GITHUB_CLIENT_SECRET}
    scopes: [repo]
    redirect_uri: http://127.0.0.1:8765/callback

  notion:
    authorize_url: https://api.notion.com/v1/oauth/authorize
    token_url: https://api.notion.com/v1/oauth/token
    client_id: ${env:NOTION_CLIENT_ID}
    client_secret: ${env:NOTION_CLIENT_SECRET}
    scopes: []
    redirect_uri: http://127.0.0.1:8765/callback

  google:
    authorize_url: https://accounts.google.com/o/oauth2/v2/auth
    token_url: https://oauth2.googleapis.com/token
    client_id: ${env:GOOGLE_CLIENT_ID}
    client_secret: ${env:GOOGLE_CLIENT_SECRET}
    scopes:
      - https://www.googleapis.com/auth/gmail.send
    redirect_uri: http://127.0.0.1:8765/callback
    authorize_params:
      access_type: offline
      prompt: consent

servers:
  - name: github
    transport:
      type: http
      url: https://api.githubcopilot.com/mcp/
    credential:
      strategy: user_oauth
      provider: github
    policy:
      default: deny
      allow:
        - search_issues
        - get_file_contents

  - name: stripe
    transport:
      type: http
      url: https://mcp.stripe.com
    credential:
      strategy: service_key
      key: ${env:STRIPE_RESTRICTED_KEY}
    policy:
      default: deny
      allow:
        - list_customers

  - name: deepwiki
    transport:
      type: http
      url: https://mcp.deepwiki.com/mcp
    credential:
      strategy: none
    policy:
      default: deny
      allow:
        - read_wiki_structure

# Agent registrations bind validated credential subjects to internal principals.
# owner_id is fixed at registration — never taken from inbound requests.
# Optional inbound_token enables Authorization: Bearer auth for local/demo agents.
agents:
  - subject:
      kind: k8s_service_account
      namespace: torii-agents
      service_account: catalog-agent
    agent_id: agent-catalog-01
    owner_id: user-alice
    groups:
      - agents
