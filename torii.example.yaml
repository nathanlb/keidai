# Torii gateway configuration — loaded at boot, no database required.
#
# Shapes match @torii/shared (ToriiConfig, ServerConfig, CredentialConfig,
# PolicyConfig, OAuthProviderConfig). Env refs use ${env:VAR} and are resolved
# before validation; non-env placeholders such as ${request.user} are left as-is.

oauth_providers:
  github:
    token_url: https://github.com/login/oauth/access_token
    client_id: ${env:GITHUB_CLIENT_ID}
    client_secret: ${env:GITHUB_CLIENT_SECRET}
    scopes: [repo]

servers:
  - name: github
    transport:
      type: http
      url: https://api.githubcopilot.com/mcp/
    credential:
      strategy: user_oauth
      provider: github
      subject: ${request.user}
    policy:
      default: deny
      allow:
        - search_issues
        - get_file_contents

  - name: stripe
    transport:
      type: http
      url: https://mcp.stripe.com
    credential:
      strategy: service_key
      key: ${env:STRIPE_RESTRICTED_KEY}
    policy:
      default: deny
      allow:
        - list_customers

  - name: deepwiki
    transport:
      type: http
      url: https://mcp.deepwiki.com/mcp
    credential:
      strategy: none
    policy:
      default: deny
      allow:
        - read_wiki_structure
