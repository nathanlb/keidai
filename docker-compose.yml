services:
  torii:
    build:
      context: .
      dockerfile: apps/torii/Dockerfile
    environment:
      SHAIDEN_BEARER: ${SHAIDEN_BEARER:?SHAIDEN_BEARER is required}
      TORII_CONFIG_PATH: /app/torii.demo.yaml
    volumes:
      - ./apps/torii/torii.demo.yaml:/app/torii.demo.yaml:ro
    ports:
      - "3100:3100"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.TORII_PORT || 3100) + '/api/config/servers').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  shaiden:
    build:
      context: .
      dockerfile: apps/shaiden/Dockerfile
    depends_on:
      torii:
        condition: service_healthy
    environment:
      SHAIDEN_BEARER: ${SHAIDEN_BEARER:?SHAIDEN_BEARER is required}
      TORII_MCP_URL: http://torii:3100/mcp
      SHAIDEN_HOST: 0.0.0.0
      SHAIDEN_PORT: "3200"
      SHAIDEN_DB_PATH: /app/data/shaiden.db
    volumes:
      - shaiden-data:/app/data
    ports:
      - "3200:3200"

volumes:
  shaiden-data: