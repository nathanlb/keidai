# Demo gateway config — open-torii status digest scenario (NAT-16).
#
# Loaded via TORII_CONFIG_PATH=./torii.demo.yaml in apps/gateway/.env
#
# Link OAuth providers via the keidai-ui OAuth providers screen before running
# the demo. For GitHub and Google, register the gateway callback URL in each
# provider's developer console: {gateway_base}/oauth/callback/{provider}
# (default local: http://127.0.0.1:3100/oauth/callback/github, etc.)
#
# See docs/demo.md for the full walkthrough.

oauth_providers:
  github:
    token_url: https://github.com/login/oauth/access_token
    client_id: ${env:GITHUB_CLIENT_ID}
    client_secret: ${env:GITHUB_CLIENT_SECRET}
    scopes: [repo, read:user]

  notion:
    authorize_url: https://mcp.notion.com/authorize
    token_url: https://mcp.notion.com/token
    registration_endpoint: https://mcp.notion.com/register
    scopes: []

  google:
    authorize_url: https://accounts.google.com/o/oauth2/v2/auth
    token_url: https://oauth2.googleapis.com/token
    client_id: ${env:GOOGLE_CLIENT_ID}
    client_secret: ${env:GOOGLE_CLIENT_SECRET}
    scopes:
      - https://www.googleapis.com/auth/gmail.readonly
      - https://www.googleapis.com/auth/gmail.compose
    authorize_params:
      access_type: offline
      prompt: consent

servers:
  - name: linear
    transport:
      type: http
      url: https://mcp.linear.app/mcp
    credential:
      strategy: service_key
      key: ${env:LINEAR_API_KEY}
    policy:
      default: deny
      allow: [list_issues, get_issue, list_projects]

  - name: github
    transport:
      type: http
      url: https://api.githubcopilot.com/mcp/
    credential:
      strategy: user_oauth
      provider: github
    policy:
      default: deny
      allow: [search_issues, get_file_contents]

  - name: notion
    transport:
      type: http
      url: https://mcp.notion.com/mcp
    credential:
      strategy: user_oauth
      provider: notion
    policy:
      default: deny
      allow: [notion-search, notion-fetch]

  - name: gmail
    # Google managed Gmail MCP (developer preview) — no local sidecar required.
    transport:
      type: http
      url: https://gmailmcp.googleapis.com/mcp/v1
    credential:
      strategy: user_oauth
      provider: google
    policy:
      default: deny
      allow: [create_draft]

agents:
  - subject:
      kind: k8s_service_account
      namespace: torii-agents
      service_account: demo-agent
    agent_id: demo-agent-01
    owner_id: demo-owner
    groups: [agents]
    inbound_token: ${env:DEMO_AGENT_BEARER}

  - subject:
      kind: k8s_service_account
      namespace: torii-agents
      service_account: shaiden
    agent_id: shaiden-newsletter-01
    owner_id: demo-owner
    groups: [agents]
    inbound_token: ${env:SHAIDEN_BEARER}
    gated_tools:
      - gmail.create_draft
